name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Analyse · Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: evotech_core_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, bcmath, intl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --no-progress

      # Fast suite on in-memory SQLite (as configured in phpunit.xml).
      - name: Tests (SQLite)
        run: php artisan test

      # Re-run against the production engine (MySQL) to catch engine drift (ADR 0003).
      - name: Tests (MySQL)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: evotech_core_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

      # Scramble introspects model schemas to type responses, so the export needs a
      # migrated database. The generated spec is engine-independent (SQLite and MySQL
      # produce a byte-identical document), so use the SQLite default from .env.example
      # to keep this step hermetic. `composer openapi` is the same command documented
      # for regenerating the spec locally, so CI and contributors stay in step.
      - name: OpenAPI spec is committed & up to date
        run: |
          touch database/database.sqlite
          php artisan migrate --force
          composer openapi
          git diff --exit-code docs/api/openapi.json

      - name: Dependency security audit
        run: composer audit --no-dev

  deploy:
    name: Deploy to production
    # Only after the full gate above is green, and only for main. A PR must never
    # reach the server, and a red build must never become the running code.
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    # Serialise deploys. Two pushes in quick succession would otherwise run
    # composer install and migrate against the same directory concurrently.
    # cancel-in-progress stays false: a half-finished deploy is worse than a
    # queued one.
    concurrency:
      group: deploy-api
      cancel-in-progress: false

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -Eeuo pipefail
            cd "${{ secrets.API_PATH }}"

            # Refuse to deploy over local edits. The web server grew its own
            # commit once this way; deploying over it either loses that work or
            # resurrects the divergence.
            if [ -n "$(git status --porcelain)" ]; then
              git status --short
              echo "Working tree is dirty — refusing to deploy." >&2
              exit 1
            fi

            git pull --ff-only origin main

            # --no-dev: production must not carry PHPUnit/Larastan.
            composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

            php artisan migrate --force

            # Clear, not cache. A cached config makes env() return null at
            # runtime, which is exactly how a missing FCM or admin credential
            # turns into a silent no-op instead of a loud failure.
            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            # Workers hold the old code in memory until told otherwise.
            php artisan queue:restart

      # API_BASE_URL is the origin with no trailing slash, e.g.
      # https://api.evotech-sys.com. `/up` is Laravel 12's built-in health route.
      - name: Health check
        env:
          BASE: ${{ secrets.API_BASE_URL }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 15 "$BASE/up")
          echo "up: $code"
          [ "$code" = "200" ] || { echo "API is not healthy after deploy" >&2; exit 1; }
