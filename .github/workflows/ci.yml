name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Analyse · Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_DATABASE: evotech_core_test
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_mysql, mbstring, bcmath, intl
          coverage: none

      - name: Cache Composer
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Code style (Pint)
        run: ./vendor/bin/pint --test

      - name: Static analysis (Larastan)
        run: ./vendor/bin/phpstan analyse --no-progress

      # Fast suite on in-memory SQLite (as configured in phpunit.xml).
      - name: Tests (SQLite)
        run: php artisan test

      # Re-run against the production engine (MySQL) to catch engine drift (ADR 0003).
      - name: Tests (MySQL)
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: evotech_core_test
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

      # Scramble introspects model schemas to type responses, so the export needs a
      # migrated database. The generated spec is engine-independent (SQLite and MySQL
      # produce a byte-identical document), so use the SQLite default from .env.example
      # to keep this step hermetic. `composer openapi` is the same command documented
      # for regenerating the spec locally, so CI and contributors stay in step.
      - name: OpenAPI spec is committed & up to date
        run: |
          touch database/database.sqlite
          php artisan migrate --force
          composer openapi
          git diff --exit-code docs/api/openapi.json

      - name: Dependency security audit
        run: composer audit --no-dev
